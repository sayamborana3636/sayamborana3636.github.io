  </defs>
  <rect width="64" height="64" rx="14" fill="#050505"/>
  <text x="32" y="44" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="url(#g)" text-anchor="middle" filter="url(#glow)">SB</text>
